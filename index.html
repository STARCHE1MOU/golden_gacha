<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Gacha: Blue Edition</title>
    <style>
        :root {
            --bg-main: #0f111a;
            --bg-card: #151824;
            --bg-input: #1e2235;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --border: #2e344e;
            
            --r-trash: #64748b;
            --r-common: #94a3b8;
            --r-uncommon: #22c55e;
            --r-rare: #3b82f6;
            --r-elite: #a855f7;
            --r-epic: #ec4899;
            --r-legendary: #ef4444;
            --r-mythical: #f97316;
            --r-divine: #eab308;
            --r-transcend: #06b6d4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        header h1 { color: var(--accent); font-size: 2.3rem; text-transform: uppercase; letter-spacing: 2px; }

        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { background-color: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: 600; transition: all 0.3s; }
        .tab-btn.active, .tab-btn:hover { background-color: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Блок синхронизации */
        .source-config { background-color: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 25px; transition: all 0.3s ease; }
        .config-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .config-header h3 { font-size: 1.17rem; }
        .btn-toggle-config { background: none; border: none; color: var(--accent); font-weight: bold; cursor: pointer; font-size: 0.9rem; padding: 5px 10px; border-radius: 4px; transition: background-color 0.2s; }
        .btn-toggle-config:hover { background-color: var(--bg-input); }
        
        .config-content { margin-top: 15px; }
        .config-content.hidden { display: none; }

        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        input, select { background-color: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 6px; font-size: 0.95rem; outline: none; }
        input:focus, select:focus { border-color: var(--accent); }

        .btn-action { background-color: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn-action:hover { opacity: 0.9; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Трехколоночная панель Гачи */
        .gacha-panel { display: grid; grid-template-columns: 320px 1fr 300px; gap: 20px; }
        @media (max-width: 1100px) { .gacha-panel { grid-template-columns: 1fr 1fr; } .gacha-history-panel { grid-column: 1 / -1; } }
        @media (max-width: 768px) { .gacha-panel { grid-template-columns: 1fr; } .gacha-history-panel { grid-column: auto; } }
        
        .gacha-controls { background-color: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; height: fit-content; }

        .roll-main-zone { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .roll-display { background-color: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: flex-start; min-height: 400px; max-height: 750px; overflow-y: auto; width: 100%; }
        
        /* Панель истории */
        .gacha-history-panel { background-color: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; max-height: 750px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .history-list { overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        
        /* Кликабельный элемент истории */
        .history-item { background-color: var(--bg-input); border-left: 3px solid var(--rarity-color); padding: 8px 12px; border-radius: 4px; font-size: 0.85rem; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.2s, background-color 0.2s; }
        .history-item:hover { background-color: var(--border); transform: translateX(3px); }
        .history-item-title { font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .lot-card { background: linear-gradient(145deg, #1e2235, #151824); border: 2px solid var(--rarity-color); border-radius: 12px; padding: 20px; width: 100%; max-width: 550px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); position: relative; animation: popIn 0.3s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .lot-header-wrapper { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; margin-bottom: 5px; }
        .lot-category { text-transform: uppercase; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; color: var(--text-muted); }
        
        .btn-copy { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
        .btn-copy:hover { border-color: var(--accent); color: var(--text-main); }
        .btn-copy.copied { background: #065f46; border-color: #34d399; color: #34d399; }

        .lot-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 8px; color: #fff; line-height: 1.3; }
        .lot-rarity-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background-color: var(--rarity-color); color: #fff; margin-bottom: 12px; }
        .lot-rarity-badge.dark-txt { color: #000; }
        .lot-desc { background-color: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border-left: 4px solid var(--rarity-color); text-align: left; white-space: pre-wrap; font-size: 0.95rem; }

        .db-filters { background-color: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 25px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 15px; }
        @media (max-width: 1000px) { .db-filters { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 600px) { .db-filters { grid-template-columns: 1fr; } }
        
        .db-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .db-card { background-color: var(--bg-card); border: 1px solid var(--border); border-top: 4px solid var(--rarity-color); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .db-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
        .db-card-title { font-weight: bold; font-size: 1.1rem; padding-right: 5px; }
        .db-card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; margin-bottom: 5px; }
        .db-card-num { font-size: 0.8rem; color: var(--text-muted); background: var(--bg-input); padding: 2px 6px; border-radius: 4px; }
        .db-card-desc { font-size: 0.9rem; color: #cbd5e1; background: rgba(0,0,0,0.15); padding: 10px; border-radius: 6px; flex-grow: 1; margin-top: 8px; white-space: pre-wrap; }

        .pagination-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 30px; padding: 15px; background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; }
        .page-info { font-size: 0.95rem; color: var(--text-muted); }
        .btn-page { background-color: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-page:hover:not(:disabled) { border-color: var(--accent); background-color: var(--bg-card); }
        .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }

        .status-indicator { padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; display: inline-block; margin-top: 5px; }
        .status-success { background-color: #065f46; color: #34d399; }
        .status-error { background-color: #991b1b; color: #f87171; }
        .status-loading { background-color: #854d0e; color: #fbbf24; }
        .placeholder-text { color: var(--text-muted); font-size: 1.2rem; margin: auto; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Chaos Gacha: Blue Edition</h1>
        <p>Боги Хаоса благословили тебя!</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('gacha')">🎰 Симулятор Гачи</button>
        <button class="tab-btn" onclick="switchTab('database')">📚 База Данных</button>
    </div>

    <div class="source-config">
        <div class="config-header" onclick="toggleConfigBlock()">
            <h3>🗄️ Синхронизация файлов базы</h3>
            <button class="btn-toggle-config" id="btn-toggle-config">[ Скрыть ]</button>
        </div>
        <div class="config-content" id="config-content-zone">
            <div class="config-grid">
                <div class="form-group"><label>Способности</label><input type="text" id="path-abilities" value="ability.txt"><span id="status-abilities" class="status-indicator status-loading">Ожидание...</span></div>
                <div class="form-group"><label>Предметы</label><input type="text" id="path-items" value="item.txt"><span id="status-items" class="status-indicator status-loading">Ожидание...</span></div>
                <div class="form-group"><label>Черты</label><input type="text" id="path-traits" value="trait.txt"><span id="status-traits" class="status-indicator status-loading">Ожидание...</span></div>
                <div class="form-group"><label>Навыки</label><input type="text" id="path-skills" value="skill.txt"><span id="status-skills" class="status-indicator status-loading">Ожидание...</span></div>
                <div class="form-group"><label>Фамильяры</label><input type="text" id="path-familiars" value="familiar.txt"><span id="status-familiars" class="status-indicator status-loading">Ожидание...</span></div>
            </div>
            <button class="btn-action" onclick="loadAllDatabases()">🔄 Синхронизировать файлы</button>
        </div>
    </div>

    <div id="tab-gacha" class="tab-content active">
        <div class="gacha-panel">
            <div class="gacha-controls">
                <h3 style="margin-bottom: 15px;">Настройки Ролла</h3>
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>1. Выберите категорию</label>
                    <select id="roll-category">
                        <option value="random">🎲 Случайная (Random)</option>
                        <option value="abilities">🔮 Способности (Ability)</option>
                        <option value="items">⚔️ Предметы (Item)</option>
                        <option value="traits">🧬 Черты (Trait)</option>
                        <option value="skills">📖 Навыки (Skill)</option>
                        <option value="familiars">🐉 Фамильяры (Familiar)</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>2. Выберите используемый билет</label>
                    <select id="roll-ticket">
                        <option value="all_random" selected>🎲 Билет "Рандом" [0.1 - 10.0]</option>
                        <option value="bronze">🟤 Бронзовый билет [0.1 - 3.3]</option>
                        <option value="silver">⚪ Серебряный билет [0.5 - 4.3]</option>
                        <option value="gold">🟡 Золотой билет [1.5 - 5.3]</option>
                        <option value="platinum">🔵 Платиновый билет [2.5 - 6.3]</option>
                        <option value="diamond">💎 Бриллиантовый билет [3.5 - 7.3]</option>
                        <option value="legendary">🔴 Легендарный билет [4.5 - 8.3]</option>
                        <option value="mythical">🟣 Мифический билет [5.5 - 9.3]</option>
                        <option value="divine">👑 Божественный билет [6.5 - 10.0]</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label>3. Количество круток</label>
                    <select id="roll-count">
                        <option value="1" selected>1 крутка</option>
                        <option value="2">2 крутки</option>
                        <option value="3">3 крутки</option>
                        <option value="4">4 крутки</option>
                        <option value="5">5 круток</option>
                        <option value="6">6 круток</option>
                        <option value="7">7 круток</option>
                        <option value="8">8 круток</option>
                        <option value="9">9 круток</option>
                        <option value="10">10 круток</option>
                    </select>
                </div>

                <button class="btn-action" id="btn-roll" style="width: 100%; font-size: 1.2rem; padding: 15px;" onclick="performRoll()">🎯 ИСПЫТАТЬ ХАОС</button>
            </div>

            <div class="roll-main-zone">
                <div style="display: flex; justify-content: flex-end; display: none;" id="multi-copy-bar">
                    <button class="btn-copy" id="btn-copy-all" style="padding: 6px 14px;" onclick="copyAllCurrentRolls()">📋 Скопировать весь мультиролл</button>
                </div>
                <div class="roll-display" id="roll-display-zone">
                    <div class="placeholder-text">Выберите параметры и активируйте билет...</div>
                </div>
            </div>

            <div class="gacha-history-panel">
                <div class="history-header">
                    <h4 style="font-size: 1rem;">📜 История (Сессия)</h4>
                    <button class="btn-copy" style="padding: 2px 8px; font-size: 0.75rem;" onclick="clearHistory()">Очистить</button>
                </div>
                <div class="history-list" id="gacha-history-list">
                    <div style="color: var(--text-muted); font-size: 0.85rem; text-align: center; margin: auto;">История пуста</div>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-database" class="tab-content">
        <div class="db-filters">
            <div class="form-group">
                <label>Поиск по тексту</label>
                <input type="text" id="search-query" placeholder="Название или описание..." oninput="resetPageAndApply()">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="filter-category" onchange="resetPageAndApply()">
                    <option value="all">Все категории</option>
                    <option value="abilities">🔮 Способности</option>
                    <option value="items">⚔️ Предметы</option>
                    <option value="traits">🧬 Черты</option>
                    <option value="skills">📖 Навыки</option>
                    <option value="familiars">🐉 Фамильяры</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ранг редкости</label>
                <select id="filter-rarity-class" onchange="resetPageAndApply()">
                    <option value="all">Все ранги</option>
                    <option value="trash">Мусор (0.1 - 0.9)</option>
                    <option value="common">Обычный (1.0 - 1.9)</option>
                    <option value="uncommon">Необычный (2.0 - 2.9)</option>
                    <option value="rare">Редкий (3.0 - 3.9)</option>
                    <option value="elite">Элитный (4.0 - 4.9)</option>
                    <option value="epic">Эпический (5.0 - 5.9)</option>
                    <option value="legendary">Легендарный (6.0 - 6.9)</option>
                    <option value="mythical">Мифический (7.0 - 7.9)</option>
                    <option value="divine">Божественный (8.0 - 8.9)</option>
                    <option value="transcend">Трансцендентный (9.0 - 10.0)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Сортировка</label>
                <select id="filter-sort" onchange="resetPageAndApply()">
                    <option value="num-asc">По ID (Возрастание)</option>
                    <option value="rate-desc">Рейтинг: Выше → Ниже</option>
                    <option value="rate-asc">Рейтинг: Ниже → Выше</option>
                </select>
            </div>
            <div class="form-group">
                <label>Показывать лотов</label>
                <select id="filter-limit" onchange="resetPageAndApply()">
                    <option value="10">10 лотов</option>
                    <option value="20">20 лотов</option>
                    <option value="50" selected>50 лотов</option>
                    <option value="100">100 лотов</option>
                    <option value="all">Все сразу</option>
                </select>
            </div>
        </div>

        <div style="margin-bottom: 15px; font-size: 0.95rem; color: var(--text-muted);">
            Найдено соответствующих лотов: <span id="db-counter" style="color: var(--text-main); font-weight: bold;">0</span>
            <span id="db-limit-note" style="margin-left: 10px; font-style: italic; color: var(--accent);"></span>
        </div>

        <div class="db-grid" id="db-results-grid"></div>

        <div class="pagination-controls" id="db-pagination" style="display: none;">
            <button class="btn-page" id="btn-page-prev" onclick="changePage(-1)">← Назад</button>
            <span class="page-info" id="db-page-info">Страница 1 из 1</span>
            <button class="btn-page" id="btn-page-next" onclick="changePage(1)">Вперед →</button>
        </div>
    </div>
</div>

<script>
    const gachaDatabase = { abilities: [], items: [], traits: [], skills: [], familiars: [] };
    let currentRollResults = []; 
    let dbCurrentPage = 1;       

    const categoriesMeta = {
        abilities: { name: 'Способность', icon: '🔮' },
        items: { name: 'Предмет', icon: '⚔️' },
        traits: { name: 'Черта', icon: '🧬' },
        skills: { name: 'Навык', icon: '📖' },
        familiars: { name: 'Фамильяр', icon: '🐉' }
    };

    const ticketRanges = {
        all_random: { min: 0.1, max: 10.0 },
        bronze: { min: 0.1, max: 3.3 },
        silver: { min: 0.5, max: 4.3 },
        gold: { min: 1.5, max: 5.3 },
        platinum: { min: 2.5, max: 6.3 },
        diamond: { min: 3.5, max: 7.3 },
        legendary: { min: 4.5, max: 8.3 },
        mythical: { min: 5.5, max: 9.3 },
        divine: { min: 6.5, max: 10.0 }
    };

    function getRarityMeta(rating) {
        const r = parseFloat(rating);
        if (r >= 0.1 && r <= 0.9) return { label: 'Мусор', color: '#64748b', darkTxt: false };
        if (r >= 1.0 && r <= 1.9) return { label: 'Обычный', color: '#94a3b8', darkTxt: true };
        if (r >= 2.0 && r <= 2.9) return { label: 'Необычный', color: '#22c55e', darkTxt: true };
        if (r >= 3.0 && r <= 3.9) return { label: 'Редкий', color: '#3b82f6', darkTxt: false };
        if (r >= 4.0 && r <= 4.9) return { label: 'Элитный', color: '#a855f7', darkTxt: false };
        if (r >= 5.0 && r <= 5.9) return { label: 'Эпический', color: '#ec4899', darkTxt: false };
        if (r >= 6.0 && r <= 6.9) return { label: 'Легендарный', color: '#ef4444', darkTxt: false };
        if (r >= 7.0 && r <= 7.9) return { label: 'Мифический', color: '#f97316', darkTxt: false };
        if (r >= 8.0 && r <= 8.9) return { label: 'Божественный', color: '#eab308', darkTxt: true };
        if (r >= 9.0 && r <= 10.0) return { label: 'Трансцендентный', color: '#06b6d4', darkTxt: true };
        return { label: 'Неизвестно', color: '#2e344e', darkTxt: false };
    }

    function toggleConfigBlock() {
        const contentZone = document.getElementById('config-content-zone');
        const toggleBtn = document.getElementById('btn-toggle-config');
        
        if (contentZone.classList.contains('hidden')) {
            contentZone.classList.remove('hidden');
            toggleBtn.textContent = '[ Скрыть ]';
        } else {
            contentZone.classList.add('hidden');
            toggleBtn.textContent = '[ Показать ]';
        }
    }

    function copyToClipboard(button, name, id, category, rating, rarityLabel, desc) {
        const textToCopy = `[${category}] #${id} ${name}\nРанг: ${rarityLabel} (${rating})\nОписание: ${desc || 'Отсутствует'}`;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = button.textContent;
            button.textContent = '✓ Скопировано';
            button.classList.add('copied');
            setTimeout(() => {
                button.textContent = originalText;
                button.classList.remove('copied');
            }, 1500);
        }).catch(err => console.error(err));
    }

    function copyAllCurrentRolls() {
        if (!currentRollResults.length) return;
        const button = document.getElementById('btn-copy-all');
        
        const fullText = currentRollResults.map((item, idx) => {
            const meta = getRarityMeta(item.rating);
            const catMeta = categoriesMeta[item.categoryKey];
            return `--- Лот #${idx + 1} ---\n[${catMeta.name}] #${item.id} ${item.name}\nРанг: ${meta.label} (${item.rating.toFixed(1)})\nОписание: ${item.description || 'Отсутствует'}`;
        }).join('\n\n');

        navigator.clipboard.writeText(fullText).then(() => {
            const originalText = button.textContent;
            button.textContent = '✓ Весь список скопирован!';
            button.classList.add('copied');
            setTimeout(() => {
                button.textContent = originalText;
                button.classList.remove('copied');
            }, 2000);
        }).catch(err => console.error(err));
    }

    // Рендеринг одной большой карточки лота в главную зону отображения
    function displaySingleLotCard(item) {
        const displayZone = document.getElementById('roll-display-zone');
        document.getElementById('multi-copy-bar').style.display = 'none'; // Скрываем мульти-копирование
        displayZone.innerHTML = '';

        const meta = getRarityMeta(item.rating);
        const catMeta = categoriesMeta[item.categoryKey];
        const safeDesc = (item.description || '').replace(/`/g, '\\`').replace(/'/g, "\\'").replace(/"/g, '\\"');

        const lotHtml = `
            <div class="lot-card" style="--rarity-color: ${meta.color}; border-color: ${meta.color}; margin: auto;">
                <div class="lot-header-wrapper">
                    <div class="lot-category">${catMeta.icon} ${catMeta.name} • #${item.id}</div>
                    <button class="btn-copy" onclick="copyToClipboard(this, '${item.name}', '${item.id}', '${catMeta.name}', '${item.rating.toFixed(1)}', '${meta.label}', \`${safeDesc}\`)">📋 Копировать</button>
                </div>
                <div class="lot-title">${item.name}</div>
                <div>
                    <span class="lot-rarity-badge ${meta.darkTxt ? 'dark-txt' : ''}">${meta.label} (${item.rating.toFixed(1)})</span>
                </div>
                <div class="lot-desc">${item.description || 'Описание отсутствует.'}</div>
            </div>`;
            
        displayZone.insertAdjacentHTML('beforeend', lotHtml);
    }

    function addToHistory(item) {
        const historyList = document.getElementById('gacha-history-list');
        if (historyList.querySelector('.placeholder-text') || historyList.textContent.includes('История пуста')) {
            historyList.innerHTML = '';
        }

        const meta = getRarityMeta(item.rating);
        const catMeta = categoriesMeta[item.categoryKey];

        const historyItem = document.createElement('div');
        historyItem.className = 'history-item';
        historyItem.style.setProperty('--rarity-color', meta.color);
        
        // Предохраняем кавычки в JSON-строке для передачи в атрибут onclick
        const escapedItemJson = JSON.stringify(item).replace(/'/g, "&apos;").replace(/"/g, '&quot;');
        historyItem.setAttribute('onclick', `displaySingleLotCard(${escapedItemJson})`);

        historyItem.innerHTML = `
            <div class="history-item-title" title="${item.name}">${catMeta.icon} ${item.name}</div>
            <div style="font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between;">
                <span>#${item.id} (${meta.label})</span>
                <span style="color: ${meta.color}; font-weight: bold;">${item.rating.toFixed(1)}</span>
            </div>
        `;
        historyList.insertBefore(historyItem, historyList.firstChild);
    }

    function clearHistory() {
        document.getElementById('gacha-history-list').innerHTML = `
            <div style="color: var(--text-muted); font-size: 0.85rem; text-align: center; margin: auto;">История пуста</div>
        `;
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(`tab-${tabId}`).classList.add('active');
        if(tabId === 'database') applyFilters();
    }

    function parseChaosFile(text) {
        const items = [];
        if (!text) return items;
        const rawBlocks = text.split(/(?=\n\d+\.)|(?=^\d+\.)/m);
        for (let block of rawBlocks) {
            block = block.trim();
            if (!block) continue;
            const hashIndex = block.indexOf('#');
            let headerLine = hashIndex !== -1 ? block.substring(0, hashIndex).trim() : block;
            let description = hashIndex !== -1 ? block.substring(hashIndex + 1).trim() : "";
            const dotIndex = headerLine.indexOf('.');
            const commaIndex = headerLine.lastIndexOf(',');
            if (dotIndex !== -1 && commaIndex !== -1 && commaIndex > dotIndex) {
                const id = headerLine.substring(0, dotIndex).trim();
                const name = headerLine.substring(dotIndex + 1, commaIndex).trim();
                const rating = headerLine.substring(commaIndex + 1).trim();
                if (id && name && !isNaN(parseFloat(rating))) {
                    items.push({ id: parseInt(id) || id, name: name, rating: parseFloat(rating), description: description });
                }
            }
        }
        return items;
    }

    async function loadDatabaseFile(catKey, filename) {
        const statusEl = document.getElementById(`status-${catKey}`);
        statusEl.className = 'status-indicator status-loading';
        statusEl.textContent = 'Загрузка...';
        try {
            const response = await fetch(`${filename}?t=${Date.now()}`, { cache: "no-store" });
            if (!response.ok) throw new Error();
            const text = await response.text();
            gachaDatabase[catKey] = parseChaosFile(text);
            statusEl.className = 'status-indicator status-success';
            statusEl.textContent = `ОК (${gachaDatabase[catKey].length})`;
        } catch (e) {
            statusEl.className = 'status-indicator status-error';
            statusEl.textContent = 'Ошибка 404';
            gachaDatabase[catKey] = [];
        }
    }

    async function loadAllDatabases() {
        await Promise.all([
            loadDatabaseFile('abilities', document.getElementById('path-abilities').value),
            loadDatabaseFile('items', document.getElementById('path-items').value),
            loadDatabaseFile('traits', document.getElementById('path-traits').value),
            loadDatabaseFile('skills', document.getElementById('path-skills').value),
            loadDatabaseFile('familiars', document.getElementById('path-familiars').value)
        ]);
        if (document.getElementById('tab-database').classList.contains('active')) applyFilters();
    }

    function performRoll() {
        const chosenCategory = document.getElementById('roll-category').value;
        const chosenTicket = document.getElementById('roll-ticket').value;
        const rollCount = parseInt(document.getElementById('roll-count').value) || 1;
        
        const minRate = ticketRanges[chosenTicket].min;
        const maxRate = ticketRanges[chosenTicket].max;

        let pool = [];
        if (chosenCategory === 'random') {
            Object.keys(gachaDatabase).forEach(cat => {
                gachaDatabase[cat].forEach(item => { pool.push({ ...item, categoryKey: cat }); });
            });
        } else {
            if (gachaDatabase[chosenCategory]) {
                gachaDatabase[chosenCategory].forEach(item => { pool.push({ ...item, categoryKey: chosenCategory }); });
            }
        }

        const filteredPool = pool.filter(item => item.rating >= minRate && item.rating <= maxRate);
        const displayZone = document.getElementById('roll-display-zone');
        const multiCopyBar = document.getElementById('multi-copy-bar');

        if (filteredPool.length === 0) {
            displayZone.innerHTML = `
                <div class="status-indicator status-error" style="font-size: 1.1rem; padding: 15px; margin: auto;">
                    ❌ Нет доступных лотов в диапазоне выбранного билета!<br>Убедитесь, что файлы баз загружены корректно.
                </div>`;
            multiCopyBar.style.display = 'none';
            return;
        }

        displayZone.innerHTML = ''; 
        currentRollResults = []; 

        for (let i = 0; i < rollCount; i++) {
            const rolledItem = filteredPool[Math.floor(Math.random() * filteredPool.length)];
            currentRollResults.push(rolledItem); 
            addToHistory(rolledItem);            

            const meta = getRarityMeta(rolledItem.rating);
            const catMeta = categoriesMeta[rolledItem.categoryKey];
            const safeDesc = (rolledItem.description || '').replace(/`/g, '\\`').replace(/'/g, "\\'").replace(/"/g, '\\"');

            const lotHtml = `
                <div class="lot-card" style="--rarity-color: ${meta.color}; border-color: ${meta.color};">
                    <div class="lot-header-wrapper">
                        <div class="lot-category">${catMeta.icon} ${catMeta.name} • #${rolledItem.id}</div>
                        <button class="btn-copy" onclick="copyToClipboard(this, '${rolledItem.name}', '${rolledItem.id}', '${catMeta.name}', '${rolledItem.rating.toFixed(1)}', '${meta.label}', \`${safeDesc}\`)">📋 Копировать</button>
                    </div>
                    <div class="lot-title">${rolledItem.name}</div>
                    <div>
                        <span class="lot-rarity-badge ${meta.darkTxt ? 'dark-txt' : ''}">${meta.label} (${rolledItem.rating.toFixed(1)})</span>
                    </div>
                    <div class="lot-desc">${rolledItem.description || 'Описание отсутствует.'}</div>
                </div>`;
                
            displayZone.insertAdjacentHTML('beforeend', lotHtml);
        }

        multiCopyBar.style.display = rollCount > 1 ? 'flex' : 'none';
    }

    function resetPageAndApply() {
        dbCurrentPage = 1;
        applyFilters();
    }

    function changePage(direction) {
        dbCurrentPage += direction;
        applyFilters();
    }

    function applyFilters() {
        const query = document.getElementById('search-query').value.toLowerCase().trim();
        const catFilter = document.getElementById('filter-category').value;
        const rarityFilter = document.getElementById('filter-rarity-class').value;
        const sortBy = document.getElementById('filter-sort').value;
        const limitVal = document.getElementById('filter-limit').value;

        let combinedData = [];
        Object.keys(gachaDatabase).forEach(cat => {
            if (catFilter === 'all' || catFilter === cat) {
                gachaDatabase[cat].forEach(item => { combinedData.push({ ...item, categoryKey: cat }); });
            }
        });

        if (query) {
            combinedData = combinedData.filter(item => 
                item.name.toLowerCase().includes(query) || (item.description && item.description.toLowerCase().includes(query))
            );
        }

        if (rarityFilter !== 'all') {
            combinedData = combinedData.filter(item => {
                const r = item.rating;
                if (rarityFilter === 'trash') return r >= 0.1 && r <= 0.9;
                if (rarityFilter === 'common') return r >= 1.0 && r <= 1.9;
                if (rarityFilter === 'uncommon') return r >= 2.0 && r <= 2.9;
                if (rarityFilter === 'rare') return r >= 3.0 && r <= 3.9;
                if (rarityFilter === 'elite') return r >= 4.0 && r <= 4.9;
                if (rarityFilter === 'epic') return r >= 5.0 && r <= 5.9;
                if (rarityFilter === 'legendary') return r >= 6.0 && r <= 6.9;
                if (rarityFilter === 'mythical') return r >= 7.0 && r <= 7.9;
                if (rarityFilter === 'divine') return r >= 8.0 && r <= 8.9;
                if (rarityFilter === 'transcend') return r >= 9.0 && r <= 10.0;
                return true;
            });
        }

        if (sortBy === 'num-asc') combinedData.sort((a, b) => a.id - b.id);
        else if (sortBy === 'rate-desc') combinedData.sort((a, b) => b.rating - a.rating);
        else if (sortBy === 'rate-asc') combinedData.sort((a, b) => a.rating - b.rating);

        const totalFound = combinedData.length;
        document.getElementById('db-counter').textContent = totalFound;

        let displayData = combinedData;
        const limitNoteEl = document.getElementById('db-limit-note');
        const paginationEl = document.getElementById('db-pagination');
        
        if (limitVal !== 'all') {
            const limit = parseInt(limitVal);
            const totalPages = Math.ceil(totalFound / limit) || 1;
            
            if (dbCurrentPage > totalPages) dbCurrentPage = totalPages;
            if (dbCurrentPage < 1) dbCurrentPage = 1;

            const startIndex = (dbCurrentPage - 1) * limit;
            displayData = combinedData.slice(startIndex, startIndex + limit);

            if (totalFound > limit) {
                limitNoteEl.textContent = `(Показано лотов: с ${startIndex + 1} по ${Math.min(startIndex + limit, totalFound)})`;
                paginationEl.style.display = 'flex';
                document.getElementById('db-page-info').textContent = `Страница ${dbCurrentPage} из ${totalPages}`;
                document.getElementById('btn-page-prev').disabled = dbCurrentPage === 1;
                document.getElementById('btn-page-next').disabled = dbCurrentPage === totalPages;
            } else {
                limitNoteEl.textContent = '';
                paginationEl.style.display = 'none';
            }
        } else {
            limitNoteEl.textContent = '';
            paginationEl.style.display = 'none';
        }

        const grid = document.getElementById('db-results-grid');
        grid.innerHTML = '';

        if (displayData.length === 0) {
            grid.innerHTML = '<div class="placeholder-text" style="grid-column: 1/-1; text-align: center; padding: 20px 0;">Лоты не найдены.</div>';
            return;
        }

        displayData.forEach(item => {
            const meta = getRarityMeta(item.rating);
            const catMeta = categoriesMeta[item.categoryKey];
            const safeDesc = (item.description || '').replace(/`/g, '\\`').replace(/'/g, "\\'").replace(/"/g, '\\"');
            
            const card = document.createElement('div');
            card.className = 'db-card';
            card.style.setProperty('--rarity-color', meta.color);
            card.innerHTML = `
                <div>
                    <div class="db-card-header">
                        <span class="db-card-title">${item.name}</span>
                        <span class="db-card-num">#${item.id}</span>
                    </div>
                    <div class="db-card-meta">
                        <div>
                            <span>${catMeta.icon} ${catMeta.name}</span> | 
                            <span style="color: ${meta.color}; font-weight: bold;">${meta.label} (${item.rating.toFixed(1)})</span>
                        </div>
                        <button class="btn-copy" onclick="copyToClipboard(this, '${item.name}', '${item.id}', '${catMeta.name}', '${item.rating.toFixed(1)}', '${meta.label}', \`${safeDesc}\`)">📋 Копировать</button>
                    </div>
                    <div class="db-card-desc">${item.description || 'Описание лота отсутствует.'}</div>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.addEventListener('DOMContentLoaded', () => { loadAllDatabases(); });
</script>
